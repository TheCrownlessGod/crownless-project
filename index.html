<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MQTT聊天室</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui;
      margin: 0;
      padding: 0;
    }
    body {
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
      background: #fff;
    }
    .tip-box {
      background: #f0f7ff;
      border: 1px solid #94b8e8;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 15px;
    }
    .tip-box h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #1a4b99;
    }
    .tip-box p {
      margin: 6px 0;
      font-size: 14px;
    }
    #chatBox {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
    }
    .msg {
      margin: 6px 0;
      padding: 8px;
      border-radius: 4px;
      max-width: 80%;
    }
    .self {
      background: #e3f2fd;
      text-align: right;
      margin-left: auto;
    }
    .other {
      background: #f1f1f1;
      text-align: left;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 16px;
      background: #2196f3;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="tip-box">
    <h3>聊天室使用须知</h3>
    <p>1. 频道号数字/字母均可，双方完全一致才能互通；</p>
    <p>2. 浏览器拦截会导致连不上，建议关闭广告拦截/无痕模式测试；</p>
    <p>3. 点击加入频道出现「连接成功」弹窗再发消息。</p>
  </div>

  <div class="input-row">
    <input id="usernameInput" placeholder="输入你的昵称">
    <input id="channelInput" placeholder="输入频道号加入房间">
    <button onclick="joinChannel()">加入频道</button>
  </div>

  <div id="chatBox"></div>

  <div class="input-row">
    <input id="msgInput" placeholder="输入消息...">
    <button onclick="sendMsg()">发送</button>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const broker = 'wss://broker.emqx.io:8884/mqtt'
    let client = null
    let currentChannel = ''
    let username = ''
    let isConnected = false

    function joinChannel() {
      username = document.getElementById('usernameInput').value.trim()
      currentChannel = document.getElementById('channelInput').value.trim()
      if (!username) return alert('请输入昵称')
      if (!currentChannel) return alert('请输入频道号')

      // 销毁旧连接
      if (client) {
        client.end()
        isConnected = false
      }

      client = mqtt.connect(broker)

      // 连接成功
      client.on('connect', () => {
        isConnected = true
        alert(`连接成功！当前频道：${currentChannel}`)
        client.subscribe(`chat/ch/${currentChannel}`, (err) => {
          if (err) alert('订阅频道失败：' + err)
        })
      })

      // 收到消息
      client.on('message', (topic, payload) => {
        try {
          const data = JSON.parse(payload.toString())
          if (data.type === 'msg') {
            addMsg(data.user, data.content, data.user === username)
          }
        } catch (e) {
          console.error('消息解析失败', e)
        }
      })

      // 连接异常
      client.on('error', (err) => {
        isConnected = false
        alert('服务器连接失败，关闭拦截工具重试：' + err)
        console.error(err)
      })

      // 断开连接
      client.on('close', () => {
        isConnected = false
      })
    }

    function sendMsg() {
      const content = document.getElementById('msgInput').value.trim()
      if (!content) return alert('请输入消息内容')
      if (!isConnected) return alert('未连接频道，请先点【加入频道】并等待成功弹窗')

      const targetTopic = `chat/ch/${currentChannel}`
      client.publish(targetTopic, JSON.stringify({
        type: 'msg',
        user: username,
        content: content
      }))
      document.getElementById('msgInput').value = ''
    }

    function addMsg(user, text, isSelf) {
      const box = document.getElementById('chatBox')
      const div = document.createElement('div')
      div.className = isSelf ? 'msg self' : 'msg other'
      div.innerText = `${user}：${text}`
      box.appendChild(div)
      box.scrollTop = box.scrollHeight
    }
  </script>
</body>
</html>
