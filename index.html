<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公共聊天室</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui;
      margin: 0;
      padding: 0;
    }
    body {
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
      background: #fff;
    }
    .status-bar {
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-weight: bold;
    }
    .disconnect {
      background: #ffe8e8;
      color: #c0392b;
      border: 1px solid #f8baba;
    }
    .connecting {
      background: #fff8cc;
      color: #b37400;
      border: 1px solid #ffe880;
    }
    .connected {
      background: #e8ffe8;
      color: #27ae60;
      border: 1px solid #baf8ba;
    }
    .tip-box {
      background: #f0f7ff;
      border: 1px solid #94b8e8;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 15px;
    }
    .tip-box h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #1a4b99;
    }
    .tip-box p {
      margin: 6px 0;
      font-size: 14px;
    }
    #chatBox {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
    }
    .msg {
      margin: 6px 0;
      padding: 8px;
      border-radius: 4px;
      max-width: 80%;
    }
    .self {
      background: #e3f2fd;
      text-align: right;
      margin-left: auto;
    }
    .other {
      background: #f1f1f1;
      text-align: left;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 16px;
      background: #2196f3;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="statusBar" class="status-bar disconnect">
    当前状态：未连接
  </div>
  <div class="tip-box">
    <h3>使用说明</h3>
    <p>频道就是聊天房间，只有两个人输入完全一样的频道号，才能互相看到对方的消息。</p>
    <p>例如：你输入 888，你的朋友也输入 888，你们就能进入同一个房间聊天。</p>
    <p>频道号可以是数字或字母，频道号不同的人无法互通消息。</p>
  </div>
  <div class="input-row">
    <input id="usernameInput" placeholder="输入你的昵称">
    <input id="channelInput" placeholder="输入频道号">
    <button onclick="joinChannel()">加入频道</button>
  </div>
  <div id="chatBox"></div>
  <div class="input-row">
    <input id="msgInput" placeholder="输入消息...">
    <button onclick="sendMsg()">发送</button>
  </div>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const broker = 'wss://broker-cn.emqx.io:8084/mqtt'
    let client = null
    let currentChannel = ''
    let username = ''
    let isConnected = false
    const statusBar = document.getElementById('statusBar')
    function updateStatus(text, isConnect) {
      if (isConnect) {
        statusBar.className = 'status-bar connected'
      } else {
        statusBar.className = 'status-bar disconnect'
      }
      statusBar.innerText = text
    }
    function joinChannel() {
      username = document.getElementById('usernameInput').value.trim()
      currentChannel = document.getElementById('channelInput').value.trim()
      if (!username) return alert('请输入昵称')
      if (!currentChannel) return alert('请输入频道号')
      if (client) {
        client.end()
        isConnected = false
      }
      updateStatus('正在连接频道 ' + currentChannel, false)
      client = mqtt.connect(broker)
      client.on('connect', () => {
        isConnected = true
        updateStatus('已连接频道 ' + currentChannel, true)
        client.subscribe(`chat/ch/${currentChannel}`)
      })
      client.on('message', (topic, payload) => {
        const data = JSON.parse(payload.toString())
        addMsg(data.user, data.content, data.user === username)
      })
      client.on('error', () => {
        isConnected = false
        updateStatus('连接失败', false)
      })
      client.on('close', () => {
        isConnected = false
        updateStatus('未连接', false)
      })
    }
    function sendMsg() {
      const content = document.getElementById('msgInput').value.trim()
      if (!content) return
      if (!isConnected) return alert('请先加入频道')
      client.publish(`chat/ch/${currentChannel}`, JSON.stringify({
        type: 'msg',
        user: username,
        content: content
      }))
      addMsg(username, content, true)
      document.getElementById('msgInput').value = ''
    }
    function addMsg(user, text, isSelf) {
      const box = document.getElementById('chatBox')
      const div = document.createElement('div')
      div.className = isSelf ? 'msg self' : 'msg other'
      div.innerText = `${user}：${text}`
      box.appendChild(div)
      box.scrollTop = box.scrollHeight
    }
  </script>
</body>
</html>
