<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网页版MQTT聊天</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{max-width:700px;margin:0 auto;padding:12px;background:#f7f7f7}
#config{background:#fff;padding:12px;border-radius:8px;margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap}
#config input{flex:1;min-width:120px;padding:8px;border:1px solid #ddd;border-radius:4px}
#config button{padding:8px 16px;background:#007aff;color:#fff;border:none;border-radius:4px;cursor:pointer}
#status{margin:8px 0;color:#666}
#chatBox{height:400px;background:#fff;border-radius:8px;padding:10px;overflow-y:auto;margin-bottom:10px}
.msg{margin:6px 0;line-height:1.5}
.self{color:#007aff}
.other{color:#333}
#sendBar{display:flex;gap:8px}
#msgInput{flex:1;padding:10px;border:1px solid #ddd;border-radius:4px}
#sendBtn{padding:10px 20px;background:#007aff;color:#fff;border:none;border-radius:4px;cursor:pointer}
</style>
</head>
<body>
<div id="config">
<input id="username" placeholder="输入昵称">
<input id="channel" placeholder="输入频道">
<button id="connectBtn">连接频道</button>
</div>
<div id="status">未连接</div>
<div id="chatBox"></div>
<div id="sendBar">
<input id="msgInput" placeholder="输入消息回车发送">
<button id="sendBtn">发送</button>
</div>
<script>
const MQTT_WSS="wss://broker.emqx.io:8084/mqtt";
let client=null,myName="",targetCh="";
const chatBox=document.getElementById("chatBox");
const statusText=document.getElementById("status");
const usernameInput=document.getElementById("username");
const channelInput=document.getElementById("channel");
const connectBtn=document.getElementById("connectBtn");
const msgInput=document.getElementById("msgInput");
const sendBtn=document.getElementById("sendBtn");
function addMsg(n,t,s){let d=document.createElement("div");d.className=s?"msg self":"msg other";d.innerText=`${n}: ${t}`;chatBox.appendChild(d);chatBox.scrollTop=chatBox.scrollHeight;}
function connectMQTT(){
myName=usernameInput.value.trim();targetCh=channelInput.value.trim();
if(!myName||!targetCh){alert("昵称和频道不能为空");return;}
if(client)client.end();
statusText.innerText="连接中...";
const clientId="web_"+Math.random().toString(16).slice(2,10);
client=mqtt.connect(MQTT_WSS,{clientId,clean:true,reconnectPeriod:1500});
client.on("connect",()=>{statusText.innerText=`已连接:${targetCh}`;client.subscribe(`chat/ch/${targetCh}`);addMsg("系统","已加入频道",false);});
client.on("message",(t,p)=>{try{let d=JSON.parse(p.toString());addMsg(d.name,d.text,d.name===myName);}catch(e){}});
client.on("error",(e)=>{statusText.innerText="连接失败";client.end();});
}
function sendMsg(){
if(!client||!client.connected){alert("先连接");return;}
let t=msgInput.value.trim();if(!t)return;
let p=JSON.stringify({channel:targetCh,name:myName,text:t});
client.publish("chat/all",p);msgInput.value="";
}
connectBtn.addEventListener("click",connectMQTT);
sendBtn.addEventListener("click",sendMsg);
msgInput.addEventListener("keydown",e=>{if(e.key==="Enter")sendMsg();});
</script>
</body>
</html>
